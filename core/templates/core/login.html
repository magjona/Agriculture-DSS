<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farm DSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        body { background-color: #2c3e50; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-primary { background-color: #27ae60; border: none; }
        .btn-primary:hover { background-color: #219150; }
    </style>
</head>
<body>
    <div class="card auth-card p-4">
        <div class="text-center mb-4">
            <h2 class="text-success"><i class="fas fa-seedling me-2"></i>Farm DSS</h2>
            <p class="text-muted">Decision Support for Farmers</p>
        </div>
        
        {% if form.errors %}
            <div class="alert alert-danger small">
                Invalid username or password.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>
        </form>
        
        <div class="mt-4 text-center">
            <p class="small text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-success text-decoration-none fw-bold">Sign up here</a></p>
        </div>
    </div>
</body>
</html>
