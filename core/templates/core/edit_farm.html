{% extends 'core/base.html' %}

{% block title %}{% if farm %}Edit{% else %}Add{% endif %} Farm - Farm Decision Support{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">
        {% if farm %}Edit{% else %}Add New{% endif %} Farm
    </h1>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">
                        {% if farm %}Update{% else %}Create{% endif %} Farm
                    </button>
                    <a href="{% url 'manager_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
